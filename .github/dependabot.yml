version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      gh-actions:
        patterns:
          - "*"
    commit-message:
      prefix: ci
    cooldown:
      default-days: 7
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
    versioning-strategy: lockfile-only
    groups:
      cargo:
        patterns:
          - "*"
    commit-message:
      prefix: build
    cooldown:
      default-days: 7
